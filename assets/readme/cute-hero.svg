<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">C++ Notebook cute animated hero</title>
  <desc id="desc">A pastel 3D notebook, bunny mascot, sparkles, and C++ code cards for the C++ Notebook project.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff9f4"/>
      <stop offset="45%" stop-color="#ffe9f2"/>
      <stop offset="100%" stop-color="#eef7ff"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fff1f8"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdf8"/>
      <stop offset="100%" stop-color="#f8ecff"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff8fab"/>
      <stop offset="50%" stop-color="#d4bbfc"/>
      <stop offset="100%" stop-color="#8bd8bd"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#d991aa" flood-opacity="0.25"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <style>
      .ink{fill:#3d2a4a}
      .soft-ink{fill:#6b5577}
      .stroke{stroke:#3d2a4a;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
      .thin{stroke:#3d2a4a;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
      .line{stroke:#ffd1e0;stroke-width:3;stroke-linecap:round}
      .code{font:700 24px "JetBrains Mono",Consolas,monospace;fill:#5b3a29}
      .small{font:700 19px Nunito,Arial,sans-serif;fill:#6b5577}
      .title{font:900 58px Nunito,Arial,sans-serif;fill:#3d2a4a}
      .hand{font:700 34px "Comic Sans MS","Comic Neue",cursive;fill:#ff6f9f}
    </style>
  </defs>

  <rect width="1200" height="430" rx="34" fill="url(#bg)"/>
  <g opacity="0.55">
    <circle cx="121" cy="75" r="56" fill="#ffb7ce" filter="url(#soft)"/>
    <circle cx="1010" cy="102" r="78" fill="#d4bbfc" filter="url(#soft)"/>
    <circle cx="941" cy="350" r="82" fill="#b6f0d5" filter="url(#soft)"/>
  </g>

  <g opacity="0.55">
    <path d="M0 66H1200" class="line"/>
    <path d="M0 116H1200" class="line"/>
    <path d="M0 166H1200" class="line"/>
    <path d="M0 216H1200" class="line"/>
    <path d="M0 266H1200" class="line"/>
    <path d="M0 316H1200" class="line"/>
    <path d="M0 366H1200" class="line"/>
  </g>

  <g>
    <g transform="translate(118 72)">
      <text class="hand" x="0" y="0">learn C++ the cute way</text>
      <text class="title" x="0" y="74">C++ Notebook</text>
      <text class="small" x="4" y="116">Responsive lessons, bookmarks, palettes, sparkles, and tiny celebrations.</text>
      <rect x="0" y="150" width="178" height="48" rx="24" fill="#ffb7ce" class="thin"/>
      <text x="30" y="183" font-family="Nunito,Arial,sans-serif" font-size="21" font-weight="900" fill="#3d2a4a">15 lessons</text>
      <rect x="198" y="150" width="178" height="48" rx="24" fill="#b6f0d5" class="thin"/>
      <text x="233" y="183" font-family="Nunito,Arial,sans-serif" font-size="21" font-weight="900" fill="#3d2a4a">mobile ready</text>
      <rect x="396" y="150" width="165" height="48" rx="24" fill="#fff2a8" class="thin"/>
      <text x="430" y="183" font-family="Nunito,Arial,sans-serif" font-size="21" font-weight="900" fill="#3d2a4a">dark mode</text>
    </g>

    <g transform="translate(690 58)" filter="url(#shadow)">
      <animateTransform attributeName="transform" type="translate" values="690 58;690 48;690 58" dur="4s" repeatCount="indefinite"/>
      <path d="M66 51L354 15L470 270L172 332Z" fill="#ffd6ba" class="stroke"/>
      <path d="M37 42L329 6L443 257L147 319Z" fill="url(#paper)" class="stroke"/>
      <path d="M83 76L321 47L390 202L148 250Z" fill="url(#screen)" class="thin"/>
      <path d="M107 100L290 77" class="line"/>
      <path d="M119 129L334 103" class="line"/>
      <path d="M131 158L317 136" class="line"/>
      <path d="M144 187L354 162" class="line"/>
      <path d="M156 216L293 199" class="line"/>
      <rect x="112" y="94" width="70" height="30" rx="15" fill="#ffb7ce" opacity="0.8"/>
      <rect x="200" y="85" width="110" height="30" rx="15" fill="#d4bbfc" opacity="0.8"/>
      <text class="code" x="122" y="168">cout &lt;&lt; "hi";</text>
      <path d="M57 42L141 319" stroke="#ff8fab" stroke-width="24" stroke-linecap="round"/>
      <path d="M57 42L141 319" stroke="#3d2a4a" stroke-width="5" stroke-linecap="round"/>
      <circle cx="88" cy="92" r="10" fill="#fffdf8" class="thin"/>
      <circle cx="109" cy="164" r="10" fill="#fffdf8" class="thin"/>
      <circle cx="130" cy="236" r="10" fill="#fffdf8" class="thin"/>
    </g>

    <g transform="translate(956 232)">
      <animateTransform attributeName="transform" type="translate" values="956 232;956 220;956 232" dur="3.2s" repeatCount="indefinite"/>
      <ellipse cx="80" cy="142" rx="64" ry="14" fill="#d991aa" opacity="0.22"/>
      <path d="M35 67C22 20 44 4 67 45" fill="#fff" class="thin"/>
      <path d="M105 66C118 18 96 4 74 45" fill="#fff" class="thin"/>
      <ellipse cx="70" cy="82" rx="62" ry="58" fill="#fff" class="stroke"/>
      <circle cx="48" cy="83" r="6" class="ink"/>
      <circle cx="91" cy="83" r="6" class="ink"/>
      <circle cx="34" cy="100" r="12" fill="#ffc2d4"/>
      <circle cx="105" cy="100" r="12" fill="#ffc2d4"/>
      <path d="M64 100Q70 108 78 100" fill="none" class="thin"/>
      <path d="M29 135Q70 165 112 135" fill="#ffb7ce" class="thin"/>
    </g>
  </g>

  <g>
    <g transform="translate(1030 64)">
      <animateTransform attributeName="transform" type="rotate" values="-9 0 0;10 0 0;-9 0 0" dur="2.8s" repeatCount="indefinite"/>
      <path d="M0 -22L7 -6L24 0L7 6L0 22L-7 6L-24 0L-7 -6Z" fill="#fff2a8" class="thin"/>
    </g>
    <g transform="translate(610 92)">
      <animateTransform attributeName="transform" type="translate" values="610 92;610 74;610 92" dur="3s" repeatCount="indefinite"/>
      <path d="M0 -18L6 -5L20 0L6 5L0 18L-6 5L-20 0L-6 -5Z" fill="#b6f0d5" class="thin"/>
    </g>
    <g transform="translate(1083 181)">
      <animateTransform attributeName="transform" type="scale" values="1;1.18;1" dur="2.2s" repeatCount="indefinite"/>
      <path d="M0 20C-39 -6 -23 -38 0 -22C23 -38 39 -6 0 20Z" fill="#ff8fab" class="thin"/>
    </g>
    <g transform="translate(649 337)">
      <animateTransform attributeName="transform" type="translate" values="649 337;649 319;649 337" dur="3.6s" repeatCount="indefinite"/>
      <circle cx="0" cy="0" r="18" fill="#d4bbfc" class="thin"/>
      <circle cx="10" cy="-6" r="8" fill="#fffdf8"/>
    </g>
  </g>

  <rect x="42" y="382" width="1116" height="10" rx="5" fill="url(#ribbon)" opacity="0.78">
    <animate attributeName="opacity" values="0.45;0.9;0.45" dur="3.5s" repeatCount="indefinite"/>
  </rect>
</svg>
