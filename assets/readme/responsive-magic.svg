<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="250" viewBox="0 0 1100 250" role="img" aria-labelledby="title desc">
  <title id="title">Animated responsive design banner</title>
  <desc id="desc">Cute animated desktop, tablet, and phone layouts connected by sparkly motion.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#16303b"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdf8"/>
      <stop offset="100%" stop-color="#eef7ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="10" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <style>
      .stroke{stroke:#ffe5f0;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .dark{stroke:#3d2a4a;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
      .line{stroke:#ffd1e0;stroke-width:3;stroke-linecap:round}
      .title{font:900 34px Nunito,Arial,sans-serif;fill:#fff9f4}
      .sub{font:800 18px Nunito,Arial,sans-serif;fill:#bee3f8}
      .label{font:900 18px Nunito,Arial,sans-serif;fill:#3d2a4a}
    </style>
  </defs>

  <rect width="1100" height="250" rx="28" fill="url(#bg)"/>
  <text x="48" y="56" class="title">Responsive, soft, and readable</text>
  <text x="50" y="85" class="sub">The notebook reshapes from desktop to phone without losing the cute style.</text>

  <path d="M334 148C420 96 491 96 577 148" fill="none" stroke="#ffb7ce" stroke-width="5" stroke-linecap="round" stroke-dasharray="12 16">
    <animate attributeName="stroke-dashoffset" values="0;-56" dur="2.2s" repeatCount="indefinite"/>
  </path>
  <path d="M688 148C749 102 808 104 864 148" fill="none" stroke="#b6f0d5" stroke-width="5" stroke-linecap="round" stroke-dasharray="12 16">
    <animate attributeName="stroke-dashoffset" values="0;-56" dur="2.2s" repeatCount="indefinite"/>
  </path>

  <g transform="translate(66 111)" filter="url(#shadow)">
    <animateTransform attributeName="transform" type="translate" values="66 111;66 101;66 111" dur="3.8s" repeatCount="indefinite"/>
    <rect width="270" height="118" rx="20" fill="#ffd6ba" class="stroke"/>
    <rect x="18" y="18" width="234" height="73" rx="13" fill="url(#screen)" class="dark"/>
    <rect x="37" y="33" width="52" height="43" rx="9" fill="#ffb7ce"/>
    <rect x="105" y="33" width="122" height="43" rx="9" fill="#fffdf8" class="dark"/>
    <path d="M119 47H206M119 62H192" class="line"/>
    <rect x="105" y="100" width="60" height="8" rx="4" fill="#3d2a4a"/>
    <text x="89" y="139" class="label">desktop</text>
  </g>

  <g transform="translate(579 94)" filter="url(#shadow)">
    <animateTransform attributeName="transform" type="translate" values="579 94;579 107;579 94" dur="3.4s" repeatCount="indefinite"/>
    <rect width="138" height="154" rx="22" fill="#d4bbfc" class="stroke"/>
    <rect x="14" y="22" width="110" height="98" rx="13" fill="url(#screen)" class="dark"/>
    <rect x="30" y="41" width="78" height="22" rx="11" fill="#ffb7ce"/>
    <rect x="30" y="78" width="78" height="26" rx="10" fill="#fff2a8" class="dark"/>
    <circle cx="69" cy="134" r="7" fill="#3d2a4a"/>
    <text x="43" y="181" class="label">tablet</text>
  </g>

  <g transform="translate(871 80)" filter="url(#shadow)">
    <animateTransform attributeName="transform" type="translate" values="871 80;871 67;871 80" dur="3s" repeatCount="indefinite"/>
    <rect width="93" height="168" rx="25" fill="#ffb7ce" class="stroke"/>
    <rect x="10" y="28" width="73" height="108" rx="14" fill="url(#screen)" class="dark"/>
    <rect x="24" y="46" width="46" height="18" rx="9" fill="#b6f0d5"/>
    <path d="M25 83H69M25 101H61M25 119H66" class="line"/>
    <rect x="33" y="15" width="27" height="6" rx="3" fill="#3d2a4a"/>
    <circle cx="46" cy="150" r="6" fill="#3d2a4a"/>
    <text x="23" y="189" class="label">phone</text>
  </g>

  <g transform="translate(1021 60)">
    <animateTransform attributeName="transform" type="rotate" values="-9 0 0;10 0 0;-9 0 0" dur="2.2s" repeatCount="indefinite"/>
    <path d="M0 -19L7 -5L22 0L7 5L0 19L-7 5L-22 0L-7 -5Z" fill="#fff2a8" class="stroke"/>
  </g>
</svg>
