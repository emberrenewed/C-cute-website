<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">Responsive cute preview</title>
  <desc id="desc">Desktop, tablet, and phone previews of a cute responsive C++ Notebook website.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdf8"/>
      <stop offset="100%" stop-color="#f4efff"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffeaf3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="14" flood-color="#b68ba0" flood-opacity="0.24"/>
    </filter>
    <style>
      .ink{fill:#3d2a4a}
      .label{font:900 26px Nunito,Arial,sans-serif;fill:#3d2a4a}
      .small{font:800 17px Nunito,Arial,sans-serif;fill:#6b5577}
      .stroke{stroke:#3d2a4a;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
      .thin{stroke:#3d2a4a;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
      .line{stroke:#ffd1e0;stroke-width:3;stroke-linecap:round}
    </style>
  </defs>

  <rect width="1100" height="520" rx="34" fill="url(#bg)"/>
  <g opacity="0.55">
    <circle cx="125" cy="90" r="70" fill="#ffb7ce"/>
    <circle cx="985" cy="94" r="60" fill="#bee3f8"/>
    <circle cx="936" cy="430" r="80" fill="#b6f0d5"/>
  </g>

  <text x="62" y="66" class="label">Responsive preview</text>
  <text x="62" y="96" class="small">Desktop, tablet, and phone layouts keep the notebook cute and readable.</text>

  <g transform="translate(80 136)" filter="url(#shadow)">
    <animateTransform attributeName="transform" type="translate" values="80 136;80 128;80 136" dur="4s" repeatCount="indefinite"/>
    <rect x="0" y="0" width="610" height="340" rx="24" fill="#ffd6ba" class="stroke"/>
    <rect x="22" y="22" width="566" height="282" rx="18" fill="url(#glass)" class="thin"/>
    <rect x="48" y="52" width="128" height="220" rx="18" fill="#fff9f4" class="thin"/>
    <rect x="198" y="52" width="348" height="220" rx="18" fill="#fffdf8" class="thin"/>
    <rect x="66" y="76" width="86" height="18" rx="9" fill="#ffb7ce"/>
    <rect x="66" y="112" width="88" height="18" rx="9" fill="#d4bbfc"/>
    <rect x="66" y="148" width="74" height="18" rx="9" fill="#b6f0d5"/>
    <rect x="66" y="184" width="94" height="18" rx="9" fill="#fff2a8"/>
    <rect x="226" y="82" width="180" height="30" rx="15" fill="#ffb7ce"/>
    <path d="M226 142H510M226 176H498M226 210H460M226 244H520" class="line"/>
    <rect x="245" y="312" width="120" height="16" rx="8" fill="#3d2a4a"/>
  </g>

  <g transform="translate(692 202)" filter="url(#shadow)">
    <animateTransform attributeName="transform" type="translate" values="692 202;692 192;692 202" dur="3.4s" repeatCount="indefinite"/>
    <rect x="0" y="0" width="230" height="278" rx="24" fill="#d4bbfc" class="stroke"/>
    <rect x="18" y="24" width="194" height="216" rx="18" fill="url(#glass)" class="thin"/>
    <rect x="38" y="48" width="154" height="34" rx="17" fill="#ffb7ce"/>
    <rect x="38" y="102" width="154" height="94" rx="18" fill="#fffdf8" class="thin"/>
    <path d="M58 126H174M58 154H160M58 182H142" class="line"/>
    <circle cx="115" cy="258" r="10" fill="#3d2a4a"/>
  </g>

  <g transform="translate(902 148)" filter="url(#shadow)">
    <animateTransform attributeName="transform" type="translate" values="902 148;902 138;902 148" dur="3s" repeatCount="indefinite"/>
    <rect x="0" y="0" width="138" height="314" rx="30" fill="#ffb7ce" class="stroke"/>
    <rect x="13" y="34" width="112" height="232" rx="20" fill="#fffdf8" class="thin"/>
    <rect x="37" y="15" width="64" height="8" rx="4" fill="#3d2a4a"/>
    <rect x="28" y="58" width="84" height="27" rx="14" fill="#b6f0d5"/>
    <rect x="28" y="104" width="84" height="90" rx="16" fill="#ffeaf3" class="thin"/>
    <path d="M42 128H96M42 154H88M42 180H100" class="line"/>
    <circle cx="69" cy="290" r="10" fill="#3d2a4a"/>
  </g>

  <g>
    <g transform="translate(1011 86)">
      <animateTransform attributeName="transform" type="rotate" values="-8 0 0;10 0 0;-8 0 0" dur="2.5s" repeatCount="indefinite"/>
      <path d="M0 -20L7 -6L22 0L7 6L0 20L-7 6L-22 0L-7 -6Z" fill="#fff2a8" class="thin"/>
    </g>
    <g transform="translate(739 122)">
      <animateTransform attributeName="transform" type="scale" values="1;1.16;1" dur="2.2s" repeatCount="indefinite"/>
      <path d="M0 18C-34 -6 -20 -34 0 -20C20 -34 34 -6 0 18Z" fill="#ff8fab" class="thin"/>
    </g>
    <g transform="translate(580 116)">
      <animateTransform attributeName="transform" type="translate" values="580 116;580 99;580 116" dur="3.2s" repeatCount="indefinite"/>
      <circle r="16" fill="#bee3f8" class="thin"/>
      <circle cx="8" cy="-5" r="6" fill="#fffdf8"/>
    </g>
  </g>
</svg>
